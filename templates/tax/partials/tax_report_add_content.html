{% load djicons i18n %}
<div data-back-url="{% url 'tax:tax_reports_list' %}" hidden></div>

<div class="p-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">{% trans "Add Taxreport" %}</h1>
        <div class="flex gap-2">
            <a class="btn btn-ghost btn-sm"
               hx-get="{% url 'tax:tax_reports_list' %}"
               hx-target="#main-content-area"
               hx-push-url="true">
                {% trans "Cancel" %}
            </a>
            <button type="submit" form="add-tax_report-form" class="btn btn-sm color-primary">
                {% icon "checkmark-outline" %}
                {% trans "Save" %}
            </button>
        </div>
    </div>

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}
    <!-- Form -->
    <form id="add-tax_report-form"
          hx-post="{% url 'tax:tax_report_add' %}" class="max-w-2xl">
        {% csrf_token %}
        <div class="card mb-4">
            <div class="card-body flex flex-col gap-4">
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Name" %}</label>
                <input type="text" name="name" class="input input-sm w-full" placeholder="{% trans 'Name' %}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Period Start" %}</label>
                <input type="date" name="period_start" class="input input-sm w-full">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Period End" %}</label>
                <input type="date" name="period_end" class="input input-sm w-full">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Total Collected" %}</label>
                <input type="number" name="total_collected" class="input input-sm w-full" step="0.01" placeholder="0">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Total Paid" %}</label>
                <input type="number" name="total_paid" class="input input-sm w-full" step="0.01" placeholder="0">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Net Amount" %}</label>
                <input type="number" name="net_amount" class="input input-sm w-full" step="0.01" placeholder="0">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Status" %}</label>
                <input type="text" name="status" class="input input-sm w-full" placeholder="{% trans 'Status' %}">
                </div>
            </div>
        </div>
    </form>
</div>
